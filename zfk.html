<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZfK Aikido">
    <meta name="theme-color" content="#1a1a1a">
    <title>ZfK Aikido Trainer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        :root {
            --zfk-red: #e31e24;
            --zfk-black: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #1a1a1a;
            color: #1a1a1a;
            -webkit-tap-highlight-color: transparent;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
            height: 200px;
            max-height: 200px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-shadow { box-shadow: 0 4px 0px rgba(0,0,0,0.1); }
        .btn-shadow:active { transform: translateY(2px); box-shadow: 0 2px 0px rgba(0,0,0,0.1); }

        .reveal-content {
            transition: all 0.3s ease-in-out;
            opacity: 0;
            transform: translateY(10px);
        }
        .reveal-content.show {
            opacity: 1;
            transform: translateY(0);
        }

        .pin-dot.active {
            background-color: var(--zfk-red) !important;
            transform: scale(1.2);
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div id="app" class="w-full max-w-md bg-stone-50 flex flex-col relative overflow-hidden shadow-2xl">
        
        <!-- STARTSEITE -->
        <div id="screen-home" class="screen active flex-1 flex flex-col p-6 overflow-y-auto">
            <header class="text-center mb-8">
                <div class="inline-block bg-black text-white px-6 py-2 rounded-full border-b-4 border-[#e31e24] mb-4">
                    <h1 class="text-3xl font-black tracking-tighter">Z<span class="text-[#e31e24]">f</span>K</h1>
                </div>
                <p class="text-xs font-bold uppercase tracking-widest text-gray-500">Aikido Lern-Plattform</p>
            </header>

            <div class="bg-white rounded-3xl p-6 shadow-sm border border-gray-100 mb-6">
                <h2 class="text-center font-extrabold text-sm text-gray-400 uppercase mb-4">Gesamtfortschritt</h2>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
                <div class="grid grid-cols-3 gap-4 mt-6 text-center">
                    <div>
                        <span class="block text-2xl font-black text-[#e31e24]" id="stat-pts">0</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Punkte</span>
                    </div>
                    <div>
                        <span class="block text-2xl font-black text-black" id="stat-due">0</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Fällig</span>
                    </div>
                    <div>
                        <span class="block text-2xl font-black text-black" id="stat-rank">6. Kyu</span>
                        <span class="text-[10px] font-bold text-gray-400 uppercase">Rang</span>
                    </div>
                </div>
            </div>

            <nav class="space-y-3">
                <button onclick="startMode('learn')" class="btn-primary w-full bg-[#e31e24] text-white p-5 rounded-2xl font-extrabold flex items-center justify-between group btn-shadow">
                    <span>🥋 TRAINING STARTEN</span>
                    <span class="bg-white/20 p-2 rounded-lg group-hover:translate-x-1 transition-transform">→</span>
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startMode('quiz')" class="bg-black text-white p-4 rounded-2xl font-bold text-sm flex flex-col items-center gap-2 btn-shadow">
                        <span class="text-xl">🎯</span> QUIZ
                    </button>
                    <button onclick="startMode('duell')" class="bg-black text-white p-4 rounded-2xl font-bold text-sm flex flex-col items-center gap-2 btn-shadow">
                        <span class="text-xl">⏱️</span> DUELL
                    </button>
                </div>
                <button onclick="showScreen('lexikon')" class="w-full bg-white border-2 border-black text-black p-4 rounded-2xl font-bold text-sm flex items-center justify-center gap-2 btn-shadow">
                    <span>📖 LEXIKON A-Z</span>
                </button>
            </nav>

            <footer class="mt-auto pt-8 text-center">
                <button onclick="showScreen('pin-entry')" class="text-gray-400 text-xs font-bold hover:text-black">SENSEI LOGIN</button>
            </footer>
        </div>

        <!-- LERNEN -->
        <div id="screen-learn" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center justify-between mb-6">
                <button onclick="exitSession()" class="text-2xl font-bold">✕</button>
                <div class="h-2 flex-1 mx-6 bg-gray-200 rounded-full overflow-hidden">
                    <div id="session-progress" class="h-full bg-[#e31e24] w-0 transition-all duration-300"></div>
                </div>
                <span id="session-counter" class="text-xs font-black">1/10</span>
            </div>

            <div class="flex-1 flex flex-col justify-center gap-6">
                <div class="bg-white rounded-3xl p-8 shadow-xl border-2 border-gray-50 flex flex-col items-center text-center">
                    <div id="learn-image-container" class="mb-6 w-full h-48 bg-stone-50 rounded-2xl flex items-center justify-center overflow-hidden">
                        <img id="learn-img" src="" class="max-h-full max-w-full object-contain" onerror="this.style.display='none'">
                    </div>
                    <h2 id="learn-jp" class="text-4xl font-black mb-2 text-black">Aikido</h2>
                    <p id="learn-cat" class="text-[10px] font-black uppercase tracking-widest text-[#e31e24] bg-red-50 px-3 py-1 rounded-full"></p>
                    
                    <button onclick="playVoice()" class="mt-4 p-3 bg-gray-100 rounded-full hover:bg-gray-200 transition-colors">🔊</button>
                </div>

                <div id="reveal-area" class="h-40 flex flex-col items-center justify-center">
                    <button id="btn-reveal" onclick="revealSolution()" class="w-full bg-black text-white p-5 rounded-2xl font-black btn-shadow">LÖSUNG ANZEIGEN</button>
                    
                    <div id="rating-controls" class="hidden w-full reveal-content">
                        <p id="learn-de" class="text-2xl font-bold text-[#e31e24] mb-6 text-center">Weg der Harmonie</p>
                        <div class="grid grid-cols-3 gap-3">
                            <button onclick="handleRate(1)" class="bg-red-100 text-red-700 p-4 rounded-xl font-bold text-xs">NEIN</button>
                            <button onclick="handleRate(3)" class="bg-amber-100 text-amber-700 p-4 rounded-xl font-bold text-xs">TEILS</button>
                            <button onclick="handleRate(5)" class="bg-green-100 text-green-700 p-4 rounded-xl font-bold text-xs">JA</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- QUIZ / DUELL -->
        <div id="screen-quiz" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center justify-between mb-4">
                <button onclick="exitSession()" class="text-2xl font-bold">✕</button>
                <div id="quiz-timer" class="text-[#e31e24] font-black text-xl">60s</div>
                <div id="quiz-score" class="font-black">0 Pkt</div>
            </div>
            <div class="text-center py-8">
                <h3 id="quiz-q" class="text-4xl font-black mb-2">...</h3>
                <p id="quiz-cat-label" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Kategorie</p>
            </div>
            <div id="quiz-options" class="grid gap-3"></div>
        </div>

        <!-- LEXIKON -->
        <div id="screen-lexikon" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showScreen('home')" class="text-2xl">←</button>
                <h2 class="text-2xl font-black">Lexikon</h2>
            </div>
            <div class="relative mb-6">
                <input type="text" id="lex-search" placeholder="Begriff suchen..." oninput="updateLexikon()" class="w-full p-4 pl-12 rounded-2xl border-2 border-gray-100 outline-none focus:border-[#e31e24] transition-all">
                <span class="absolute left-4 top-1/2 -translate-y-1/2 text-xl">🔍</span>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4" id="lex-cats"></div>
            <div id="lex-list" class="flex-1 space-y-3 overflow-y-auto"></div>
        </div>

        <!-- PIN ENTRY -->
        <div id="screen-pin-entry" class="screen hidden flex-1 flex flex-col items-center justify-center p-6">
            <h2 class="text-2xl font-black mb-2">Sensei Zugang</h2>
            <p class="text-gray-400 text-sm mb-8">Bitte PIN eingeben</p>
            <div class="flex gap-4 mb-12" id="pin-dots">
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
            </div>
            <div class="grid grid-cols-3 gap-4" id="pin-grid">
                <!-- PIN Buttons werden per JS generiert -->
            </div>
            <button onclick="showScreen('home')" class="mt-12 text-gray-400 font-bold uppercase text-xs">Abbrechen</button>
        </div>

        <!-- ADMIN -->
        <div id="screen-admin" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center justify-between mb-8">
                <button onclick="showScreen('home')" class="text-2xl">←</button>
                <h2 class="text-2xl font-black">Sensei Tools</h2>
            </div>
            <div class="grid grid-cols-2 gap-3 mb-8">
                <button onclick="exportData()" class="bg-black text-white p-4 rounded-2xl text-xs font-bold">BACKUP EXPORT</button>
                <button onclick="document.getElementById('import-file').click()" class="bg-black text-white p-4 rounded-2xl text-xs font-bold">IMPORT</button>
                <input type="file" id="import-file" class="hidden" onchange="importData(event)">
            </div>
            <button onclick="addNewTerm()" class="w-full bg-[#e31e24] text-white p-4 rounded-2xl font-black mb-8">NEUER BEGRIFF</button>
            <div id="admin-list" class="flex-1 space-y-2 overflow-y-auto"></div>
        </div>

    </div>

        // --- STATE & STORAGE ---
        let appData = {
            cards: [],
            sm: {},
            stats: { pts: 0, kyu: 6 },
            pin: "0711"

        let session = {
            type: null,
            list: [],
            idx: 0,
            score: 0,
            timer: null,
            revealed: false
        };

        let pinInputValue = "";
        let lexFilter = "Alle";

        // --- INIT ---
        function init() {
            const saved = localStorage.getItem('zfk_v6_data');
            if(saved) {
                appData = JSON.parse(saved);
            } else {
                appData.cards = JSON.parse(JSON.stringify(CARDS));
            }
            setupPinPad();
            updateStats();
            initChart();
            showScreen('home');
        }

        function save() {
            localStorage.setItem('zfk_v6_data', JSON.stringify(appData));
        }

        // --- NAVIGATION ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-' + id).classList.remove('hidden');
            if(id === 'home') {
                updateStats();
                updateChart();
            }
            if(id === 'lexikon') updateLexikon();
            if(id === 'admin') renderAdmin();
        }

        // --- STATS & CHART ---
        let progressChart;
        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Gelernt', 'Noch offen'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#e31e24', '#f4f4f4'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    animation: { duration: 1500 }
                }
            });
        }

        function updateStats() {
            const learned = appData.cards.filter(c => appData.sm[c.jp]?.rep > 0).length;
            const due = appData.cards.filter(c => {
                const s = appData.sm[c.jp];
                return s && s.due <= Date.now();
            }).length;

            document.getElementById('stat-pts').textContent = appData.stats.pts;
            document.getElementById('stat-due').textContent = due;
            document.getElementById('stat-rank').textContent = appData.stats.kyu + ". Kyu";
        }

        function updateChart() {
            const learned = appData.cards.filter(c => appData.sm[c.jp]?.rep > 0).length;
            const total = appData.cards.length;
            const pct = total === 0 ? 0 : Math.round((learned / total) * 100);
            
            progressChart.data.datasets[0].data = [pct, 100 - pct];
            progressChart.update();
        }

        // --- SESSION MODES ---
        function startMode(mode) {
            session.type = mode;
            session.score = 0;
            session.idx = 0;
            session.revealed = false;

            if(mode === 'learn') {
                session.list = appData.cards.filter(c => {
                    const s = appData.sm[c.jp];
                    return !s || s.due <= Date.now();
                }).sort(() => Math.random() - 0.5);
                
                if(session.list.length === 0) return alert("Alle Karten aktuell gelernt!");
                showScreen('learn');
                renderLearnCard();
            } else if(mode === 'quiz' || mode === 'duell') {
                session.list = [...appData.cards].sort(() => Math.random() - 0.5);
                showScreen('quiz');
                if(mode === 'duell') startDuellTimer();
                renderQuiz();
            }
        }

        // --- LERNMODUS ---
        function renderLearnCard() {
            const card = session.list[session.idx];
            document.getElementById('learn-img').src = card.img || '';
            document.getElementById('learn-img').style.display = card.img ? 'block' : 'none';
            document.getElementById('learn-jp').textContent = card.jp;
            document.getElementById('learn-de').textContent = card.de;
            document.getElementById('learn-cat').textContent = card.cat;
            document.getElementById('session-counter').textContent = `${session.idx + 1}/${session.list.length}`;
            document.getElementById('session-progress').style.width = ((session.idx + 1) / session.list.length * 100) + "%";

            // Reset Reveal
            session.revealed = false;
            document.getElementById('btn-reveal').classList.remove('hidden');
            document.getElementById('rating-controls').classList.add('hidden');
            document.getElementById('rating-controls').classList.remove('show');
        }

        function revealSolution() {
            session.revealed = true;
            document.getElementById('btn-reveal').classList.add('hidden');
            document.getElementById('rating-controls').classList.remove('hidden');
            setTimeout(() => document.getElementById('rating-controls').classList.add('show'), 10);
        }

        function handleRate(q) {
            const card = session.list[session.idx];
            updateSM(card.jp, q);
            if(q >= 3) appData.stats.pts += 5;
            
            session.idx++;
            if(session.idx < session.list.length) {
                renderLearnCard();
            } else {
                alert("Sitzung beendet!");
                showScreen('home');
            }
        }

        function updateSM(id, q) {
            let s = appData.sm[id] || { interval: 0, ef: 2.5, rep: 0, due: 0 };
            if (q < 3) {
                s.rep = 0; s.interval = 1;
            } else {
                if (s.rep === 0) s.interval = 1;
                else if (s.rep === 1) s.interval = 4;
                else s.interval = Math.round(s.interval * s.ef);
                s.rep++;
            }
            s.ef = Math.max(1.3, s.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
            s.due = Date.now() + (s.interval * 86400000);
            appData.sm[id] = s;
            save();
        }

        // --- QUIZ MODUS ---
        function renderQuiz() {
            const correct = session.list[session.idx % session.list.length];
            const others = appData.cards.filter(c => c.jp !== correct.jp).sort(() => Math.random() - 0.5).slice(0, 3);
            const options = [correct, ...others].sort(() => Math.random() - 0.5);

            document.getElementById('quiz-q').textContent = correct.jp;
            document.getElementById('quiz-cat-label').textContent = correct.cat;
            document.getElementById('quiz-score').textContent = session.score + " Pkt";

            const container = document.getElementById('quiz-options');
            container.innerHTML = options.map(opt => `
                <button onclick="checkQuiz('${opt.jp}', '${correct.jp}', this)" class="quiz-box bg-white w-full p-5 rounded-2xl font-bold border-2 border-gray-100 transition-all">
                    ${opt.de}
                </button>
            `).join('');
        }

        function checkQuiz(sel, cor, el) {
            if(sel === cor) {
                el.classList.add('correct', 'bg-green-500', 'text-white');
                session.score += 10;
                appData.stats.pts += 2;
            } else {
                el.classList.add('wrong', 'bg-red-500', 'text-white');
            }
            setTimeout(() => {
                session.idx++;
                if(session.type === 'quiz' && session.idx >= 10) {
                    alert("Quiz beendet! Score: " + session.score);
                    showScreen('home');
                } else {
                    renderQuiz();
                }
            }, 600);
        }

        function startDuellTimer() {
            let time = 60;
            document.getElementById('quiz-timer').textContent = time + "s";
            session.timer = setInterval(() => {
                time--;
                document.getElementById('quiz-timer').textContent = time + "s";
                if(time <= 0) {
                    clearInterval(session.timer);
                    alert("Zeit um! Dein Score: " + session.score);
                    showScreen('home');
                }
            }, 1000);
        }

        function exitSession() {
            clearInterval(session.timer);
            showScreen('home');
        }

        // --- LEXIKON ---
        function updateLexikon() {
            const query = document.getElementById('lex-search').value.toLowerCase();
            const cats = ['Alle', ...new Set(appData.cards.map(c => c.cat))];
            
            document.getElementById('lex-cats').innerHTML = cats.map(c => `
                <button onclick="setLexFilter('${c}')" class="filter-chip px-5 py-2 rounded-full font-bold text-xs whitespace-nowrap ${lexFilter === c ? 'bg-black text-white' : 'bg-white border border-gray-100'}">
                    ${c.toUpperCase()}
                </button>
            `).join('');

            const filtered = appData.cards.filter(c => {
                const matchesSearch = c.jp.toLowerCase().includes(query) || c.de.toLowerCase().includes(query);
                const matchesCat = lexFilter === 'Alle' || c.cat === lexFilter;
                return matchesSearch && matchesCat;
            }).sort((a,b) => a.jp.localeCompare(b.jp));

            document.getElementById('lex-list').innerHTML = filtered.map(c => `
                <div class="lex-item bg-white p-4 rounded-2xl border border-gray-50 flex items-center gap-4">
                    ${c.img ? `<img src="${c.img}" class="w-12 h-12 rounded-lg object-cover" onerror="this.style.display='none'">` : '<div class="w-12 h-12 bg-gray-50 rounded-lg flex items-center justify-center">🥋</div>'}
                    <div class="flex-1">
                        <h4 class="font-black text-sm">${c.jp}</h4>
                        <p class="text-xs text-gray-400">${c.de}</p>
                    </div>
                    <span class="text-[8px] font-black text-white bg-black px-2 py-1 rounded-md uppercase">${c.cat}</span>
                </div>
            `).join('');
        }

        function setLexFilter(cat) {
            lexFilter = cat;
            updateLexikon();
        }

        // --- PIN PAD ---
        function setupPinPad() {
            const grid = document.getElementById('pin-grid');
            [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(val => {
                const btn = document.createElement('button');
                btn.className = "w-16 h-16 rounded-full bg-white border-2 border-gray-100 font-black text-xl hover:border-[#e31e24] transition-colors";
                btn.textContent = val;
                btn.onclick = () => handlePin(val);
                grid.appendChild(btn);
            });
        }

        function handlePin(val) {
            if(val === 'C') pinInputEleValue = "";
            else if(val === 'OK') checkPin();
            else if(pinInputEleValue.length < 4) pinInputEleValue += val;
            
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < pinInputEleValue.length));
            
            if(pinInputEleValue.length === 4 && val !== 'OK') {
                setTimeout(checkPin, 300);
            }
        }
        
        let pinInputEleValue = "";
        function checkPin() {
            if(pinInputEleValue === appData.pin) {
                pinInputEleValue = "";
                updatePinDots();
                showScreen('admin');
            } else {
                alert("PIN FALSCH");
                pinInputEleValue = "";
                updatePinDots();
            }
        }
        
        function updatePinDots() {
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < pinInputEleValue.length));
        }

        // --- ADMIN ---
        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = appData.cards.map((c, i) => `
                <div class="flex items-center justify-between p-3 bg-white rounded-xl border border-gray-100">
                    <div>
                        <p class="text-sm font-black">${c.jp}</p>
                        <p class="text-[10px] text-gray-400">${c.de}</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="editTerm(${i})" class="text-blue-500 text-lg">✏️</button>
                        <button onclick="deleteTerm(${i})" class="text-red-500 text-lg">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.editTerm = function(i) {
            const c = appData.cards[i];
            const jp = prompt("Japanisch:", c.jp);
            const de = prompt("Deutsch:", c.de);
            const cat = prompt("Kategorie:", c.cat);
            if(jp && de) {
                appData.cards[i] = {...c, jp, de, cat: cat || c.cat};
                save(); renderAdmin();
            }
        }

        window.deleteTerm = function(i) {
            if(confirm("Löschen?")) {
                appData.cards.splice(i, 1);
                save(); renderAdmin();
            }
        }

        function addNewTerm() {
            const jp = prompt("Japanisch:");
            const de = prompt("Deutsch:");
            const cat = prompt("Kategorie:", "Grundlagen");
            if(jp && de) {
                appData.cards.push({jp, de, cat, img: ""});
                save(); renderAdmin();
            }
        }

        // --- TOOLS ---
        function playVoice() {
            const text = document.getElementById('learn-jp').textContent;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP';
            u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function exportData() {
            const blob = new Blob([JSON.stringify(appData)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `aikido_backup_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const d = JSON.parse(ev.target.result);
                    if(d.cards) {
                        appData = d;
                        save(); location.reload();
                    }
                } catch(err) { alert("Datei ungültig."); }
            };
            reader.readAsText(e.target.files[0]);
        }

        window.onload = init;
    </script>
</body>
</html>
