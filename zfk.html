<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ZfK Aikido">
    <meta name="theme-color" content="#1a1a1a">
    <title>ZfK Aikido Trainer</title>
    
    <!-- CSS & Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <!-- Fix: Globaler Image Error Handler im Head -->
    <script>
        window.handleImageError = function(img) {
            img.style.display = 'none';
            const parent = img.parentElement;
            if (parent && !parent.querySelector('.fallback-icon')) {
                const ph = document.createElement('div');
                ph.className = "fallback-icon text-4xl flex items-center justify-center h-full w-full bg-stone-50 text-gray-300";
                ph.textContent = "🥋";
                parent.appendChild(ph);
            }
        };
    </script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        :root {
            --zfk-red: #e31e24;
            --zfk-black: #1a1a1a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--zfk-black);
            color: #1a1a1a;
            -webkit-tap-highlight-color: transparent;
        }

        .chart-container {
            position: relative;
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
            height: 180px;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .btn-shadow { box-shadow: 0 4px 0px rgba(0,0,0,0.1); }
        .btn-shadow:active { transform: translateY(2px); box-shadow: 0 2px 0px rgba(0,0,0,0.1); }

        .reveal-content {
            transition: opacity 0.2s ease-in-out, transform 0.2s ease-in-out;
            opacity: 0;
            transform: translateY(5px);
            pointer-events: none;
        }
        .reveal-content.show {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }

        .pin-dot.active {
            background-color: var(--zfk-red) !important;
            transform: scale(1.2);
        }
    </style>
</head>
<body class="flex justify-center min-h-screen">

    <div id="app" class="w-full max-w-md bg-stone-50 flex flex-col relative overflow-hidden shadow-2xl">
        
        <!-- DASHBOARD -->
        <div id="screen-home" class="screen active flex-1 flex flex-col p-6 overflow-y-auto">
            <header class="text-center mb-8">
                <div class="inline-block bg-black text-white px-8 py-3 rounded-2xl border-b-4 border-[#e31e24] mb-4">
                    <h1 class="text-4xl font-black tracking-tighter italic">Z<span class="text-[#e31e24]">f</span>K</h1>
                </div>
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400">Aikido Lern-Plattform</p>
            </header>

            <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-100 mb-6">
                <h2 class="text-center font-black text-[10px] text-gray-400 uppercase tracking-widest mb-4">Dein Fortschritt</h2>
                <div class="chart-container">
                    <canvas id="progressChart"></canvas>
                </div>
                <div class="grid grid-cols-3 gap-2 mt-6">
                    <div class="text-center bg-stone-50 p-3 rounded-2xl">
                        <span class="block text-2xl font-black text-[#e31e24]" id="stat-pts">0</span>
                        <span class="text-[8px] font-bold text-gray-400 uppercase">Punkte</span>
                    </div>
                    <div class="text-center bg-stone-50 p-3 rounded-2xl">
                        <span class="block text-2xl font-black text-black" id="stat-due">0</span>
                        <span class="text-[8px] font-bold text-gray-400 uppercase">Fällig</span>
                    </div>
                    <div class="text-center bg-stone-50 p-3 rounded-2xl">
                        <span class="block text-2xl font-black text-black" id="stat-rank">6. Kyu</span>
                        <span class="text-[8px] font-bold text-gray-400 uppercase">Rang</span>
                    </div>
                </div>
            </div>

            <div class="mb-6">
                <p class="text-[10px] font-black text-gray-400 uppercase mb-3 px-1">Dein Prüfungsziel</p>
                <div class="flex gap-2 overflow-x-auto no-scrollbar" id="kyu-selector"></div>
            </div>

            <nav class="space-y-3">
                <button onclick="startMode('learn')" class="w-full bg-[#e31e24] text-white p-5 rounded-2xl font-black flex items-center justify-between group btn-shadow">
                    <span>🥋 TRAINING STARTEN</span>
                    <span class="bg-white/20 p-2 rounded-lg transition-transform group-hover:translate-x-1">→</span>
                </button>
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="startMode('quiz')" class="bg-black text-white p-4 rounded-2xl font-bold text-xs flex flex-col items-center gap-2 btn-shadow">
                        <span class="text-xl">🎯</span> QUIZ
                    </button>
                    <button onclick="startMode('duell')" class="bg-black text-white p-4 rounded-2xl font-bold text-xs flex flex-col items-center gap-2 btn-shadow">
                        <span class="text-xl">⏱️</span> DUELL
                    </button>
                </div>
                <button onclick="showScreen('lexikon')" class="w-full bg-white border-2 border-black text-black p-4 rounded-2xl font-bold text-xs flex items-center justify-center gap-2 btn-shadow uppercase tracking-wider">
                    <span>📖 Lexikon & Suche</span>
                </button>
            </nav>

            <footer class="mt-auto pt-8 text-center">
                <button onclick="showScreen('pin-entry')" class="text-gray-300 text-[10px] font-black hover:text-black transition-colors uppercase tracking-widest">Sensei Bereich</button>
            </footer>
        </div>

        <!-- LERNEN -->
        <div id="screen-learn" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center justify-between mb-6">
                <button onclick="exitSession()" class="text-2xl font-bold text-gray-300">✕</button>
                <div class="h-1.5 flex-1 mx-6 bg-gray-200 rounded-full overflow-hidden">
                    <div id="session-progress" class="h-full bg-[#e31e24] w-0 transition-all duration-300"></div>
                </div>
                <span id="session-counter" class="text-[10px] font-black">1/10</span>
            </div>

            <div class="flex-1 flex flex-col justify-center gap-4">
                <div class="bg-white rounded-[2.5rem] p-8 shadow-xl border border-gray-100 flex flex-col items-center text-center relative overflow-hidden min-h-[400px]">
                    <div id="learn-kyu-tag" class="absolute top-6 right-8 text-[10px] font-black text-white bg-black px-2 py-1 rounded-md">6. KYU</div>
                    
                    <div id="learn-image-container" class="mb-6 w-full h-44 bg-stone-50 rounded-3xl flex items-center justify-center overflow-hidden border border-gray-50">
                        <img id="learn-img" src="" class="max-h-full max-w-full object-contain p-2" onerror="handleImageError(this)">
                    </div>

                    <h2 id="learn-jp" class="text-4xl font-black mb-1 text-black">...</h2>
                    <p id="learn-cat" class="text-[9px] font-bold uppercase tracking-[0.2em] text-[#e31e24] opacity-50"></p>
                    
                    <button onclick="playVoice()" class="mt-6 p-4 bg-stone-100 rounded-full hover:bg-stone-200 transition-colors">🔊</button>
                </div>

                <div id="reveal-area" class="h-44 flex flex-col items-center justify-center">
                    <button id="btn-reveal" onclick="revealSolution()" class="w-full bg-black text-white p-5 rounded-2xl font-black btn-shadow">LÖSUNG ANZEIGEN</button>
                    
                    <div id="rating-controls" class="hidden w-full reveal-content flex flex-col items-center">
                        <p id="learn-de" class="text-2xl font-black text-[#e31e24] mb-6 text-center italic"></p>
                        <div class="grid grid-cols-3 gap-3 w-full">
                            <button onclick="handleRate(1)" class="bg-red-50 text-red-600 p-4 rounded-xl font-black text-[10px] uppercase border border-red-100">Falsch</button>
                            <button onclick="handleRate(3)" class="bg-amber-50 text-amber-600 p-4 rounded-xl font-black text-[10px] uppercase border border-amber-100">Teils</button>
                            <button onclick="handleRate(5)" class="bg-green-50 text-green-600 p-4 rounded-xl font-black text-[10px] uppercase border border-green-100">Gewusst</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- QUIZ SCREEN -->
        <div id="screen-quiz" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center justify-between mb-4">
                <button onclick="exitSession()" class="text-2xl font-bold text-gray-300">✕</button>
                <div id="quiz-timer" class="text-[#e31e24] font-black text-xl">60s</div>
                <div id="quiz-score" class="font-black text-sm">0 PKT</div>
            </div>
            <div class="flex-1 flex flex-col justify-center">
                <div class="text-center mb-10">
                    <p id="quiz-cat-label" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2">Kategorie</p>
                    <h3 id="quiz-q" class="text-4xl font-black leading-tight">...</h3>
                </div>
                <div id="quiz-options" class="grid gap-3"></div>
            </div>
        </div>

        <!-- LEXIKON -->
        <div id="screen-lexikon" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center gap-4 mb-6">
                <button onclick="showScreen('home')" class="text-2xl">←</button>
                <h2 class="text-2xl font-black">Lexikon</h2>
            </div>
            <div class="relative mb-6">
                <input type="text" id="lex-search" placeholder="Begriff suchen..." oninput="updateLexikon()" class="w-full p-4 pl-12 rounded-2xl border-2 border-gray-100 outline-none focus:border-[#e31e24] transition-all font-bold">
                <span class="absolute left-4 top-1/2 opacity-30 -translate-y-1/2">🔍</span>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar pb-4" id="lex-cats"></div>
            <div id="lex-list" class="flex-1 space-y-3 overflow-y-auto pr-1"></div>
        </div>

        <!-- PIN ENTRY -->
        <div id="screen-pin-entry" class="screen hidden flex-1 flex flex-col items-center justify-center p-6">
            <h2 class="text-2xl font-black mb-8">Sensei Zugang</h2>
            <div class="flex gap-4 mb-12" id="pin-dots">
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
                <div class="pin-dot w-4 h-4 rounded-full bg-gray-200"></div>
            </div>
            <div class="grid grid-cols-3 gap-4" id="pin-grid"></div>
            <button onclick="showScreen('home')" class="mt-12 text-gray-300 font-bold uppercase text-[10px] tracking-widest">Abbrechen</button>
        </div>

        <!-- ADMIN -->
        <div id="screen-admin" class="screen hidden flex-1 flex flex-col p-6">
            <div class="flex items-center justify-between mb-8">
                <button onclick="showScreen('home')" class="text-2xl">←</button>
                <h2 class="text-2xl font-black">Sensei Tools</h2>
            </div>
            
            <div id="admin-form" class="hidden bg-white p-6 rounded-3xl border border-gray-100 shadow-xl mb-8 space-y-4">
                <h3 id="form-title" class="font-black uppercase text-xs text-[#e31e24]">Begriff bearbeiten</h3>
                <input type="hidden" id="edit-index">
                <input type="text" id="inp-jp" placeholder="Japanisch" class="w-full p-3 rounded-xl bg-stone-50 border-none font-bold text-sm">
                <input type="text" id="inp-de" placeholder="Deutsch" class="w-full p-3 rounded-xl bg-stone-50 border-none font-bold text-sm">
                <div class="flex gap-2">
                    <input type="number" id="inp-kyu" placeholder="Kyu (6-1)" class="w-1/3 p-3 rounded-xl bg-stone-50 border-none font-bold text-sm">
                    <select id="inp-cat" class="w-2/3 p-3 rounded-xl bg-stone-50 border-none font-bold text-sm">
                        <option>Grundlagen</option>
                        <option>Etikette</option>
                        <option>Rollen</option>
                        <option>Techniken</option>
                        <option>Bewegungen</option>
                        <option>Ukemi</option>
                        <option>Angriffe</option>
                        <option>Waffen</option>
                        <option>Bodenkampf</option>
                    </select>
                </div>
                <input type="text" id="inp-img" placeholder="Bildpfad (z.B. bilder/Aiki.png)" class="w-full p-3 rounded-xl bg-stone-50 border-none font-bold text-sm">
                <div class="flex gap-2 pt-2">
                    <button onclick="saveAdminForm()" class="flex-1 bg-black text-white p-3 rounded-xl font-black text-xs">SPEICHERN</button>
                    <button onclick="closeAdminForm()" class="flex-1 bg-gray-100 text-gray-400 p-3 rounded-xl font-black text-xs">ABBRECHEN</button>
                </div>
            </div>

            <div id="admin-controls" class="space-y-3">
                <button onclick="openAdminForm(-1)" class="w-full bg-[#e31e24] text-white p-4 rounded-2xl font-black text-sm mb-4">+ NEUER BEGRIFF</button>
                <div class="grid grid-cols-2 gap-3 mb-6">
                    <button onclick="exportData()" class="bg-black text-white p-4 rounded-xl text-[10px] font-black uppercase">Backup Export</button>
                    <button onclick="document.getElementById('import-file').click()" class="bg-black text-white p-4 rounded-xl text-[10px] font-black uppercase">Import</button>
                    <input type="file" id="import-file" class="hidden" onchange="importData(event)">
                </div>
            </div>

            <div id="admin-list" class="flex-1 space-y-3 overflow-y-auto"></div>
        </div>

    </div>

    <script>
        // --- VOLLSTÄNDIGER DATENSATZ ---
        const CARDS = [
            {jp:"Aikido",de:"Weg der harmonischen Kraft",cat:"Grundlagen",img:"bilder/357252c205-aikido kanji.png",kyu:6},
            {jp:"Aiki",de:"Vereinigung der Kräfte",cat:"Grundlagen",img:"bilder/Aiki.png",kyu:6},
            {jp:"Dojo",de:"Übungsraum",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Sensei",de:"Lehrer",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Sempai",de:"Älterer Schüler",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Kohai",de:"Jüngerer Schüler",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Tatami",de:"Matte",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Gi / Dogi",de:"Übungsanzug",cat:"Grundlagen",img:"bilder/Uwagi transparent.png",kyu:6},
            {jp:"Hakama",de:"Weite Übungshose",cat:"Grundlagen",img:"bilder/Hakama.png",kyu:5},
            {jp:"Obi",de:"Gürtel",cat:"Grundlagen",img:"bilder/Obi.png",kyu:6},
            {jp:"Kamae",de:"Haltung / Stellung",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Hanmi",de:"Schrittstellung",cat:"Grundlagen",img:"",kyu:6},
            {jp:"Ma-ai",de:"Optimaler Kampfabstand",cat:"Grundlagen",img:"bilder/Maai 2.png",kyu:5},
            {jp:"Zanshin",de:"Wachsame Aufmerksamkeit",cat:"Grundlagen",img:"",kyu:5},
            {jp:"Ki",de:"Lebensenergie",cat:"Grundlagen",img:"bilder/Ki.jpg",kyu:6},
            {jp:"Ai-Kamae",de:"Harmonische Stellung",cat:"Grundlagen",img:"bilder/Ai Kamae 2.png",kyu:5},
            {jp:"Gyaku-Kamae",de:"Gespiegelte Stellung",cat:"Grundlagen",img:"bilder/Gyaku Kamae.png",kyu:5},
            {jp:"Morihei Ueshiba",de:"O-Sensei (Begründer)",cat:"Grundlagen",img:"bilder/O_Sensei.jpg",kyu:6},
            {jp:"Aiki-Otoshi",de:"Aushebewurf",cat:"Grundlagen",img:"bilder/Aiki Otoshi 3.png",kyu:3},
            {jp:"Ude-Kime-Nage",de:"Armhebelwurf",cat:"Grundlagen",img:"bilder/Ude Kime Nage.png",kyu:4},
            {jp:"Randori",de:"Freies Üben",cat:"Grundlagen",img:"bilder/Randori.png",kyu:2},
            {jp:"Rei",de:"Verbeugung / Gruß",cat:"Etikette",img:"bilder/Rei im Stand.png",kyu:6},
            {jp:"Mokuso",de:"Meditation",cat:"Etikette",img:"bilder/Seiza seitlich transparent.png",kyu:6},
            {jp:"Seiza",de:"Kniesitz",cat:"Etikette",img:"bilder/Hinsetzen.png",kyu:6},
            {jp:"Ude Osae Irimi",de:"Ikkyo (Direkt)",cat:"Techniken",img:"bilder/Ude Osae Irimi 2.png",kyu:6},
            {jp:"Ude Osae Tenkan",de:"Ikkyo (Drehend)",cat:"Techniken",img:"bilder/Ude Osae Tenkan.png",kyu:5},
            {jp:"Kote Mawashi",de:"Nikyo (Handgelenk)",cat:"Techniken",img:"bilder/Kote Mawashi.png",kyu:4},
            {jp:"Kote Hineri",de:"Sankyo (Drehgriff)",cat:"Techniken",img:"bilder/Kote Hineri 3.png",kyu:3},
            {jp:"Tekubi Osae",de:"Yonkyo (Druckpunkt)",cat:"Techniken",img:"bilder/Tekubi Osae Irimi.png",kyu:2},
            {jp:"Irimi-Nage",de:"Eintrittswurf",cat:"Techniken",img:"bilder/Irimi Nage 4 transparent.png",kyu:6},
            {jp:"Shiho-Nage",de:"Vier-Seiten-Wurf",cat:"Techniken",img:"bilder/Shiho Nage 3.png",kyu:5},
            {jp:"Kote-Gaeshi",de:"Handgelenkswurf",cat:"Techniken",img:"bilder/Kote Gaeshi transparent.png",kyu:5},
            {jp:"Tenchi-Nage",de:"Himmel-Erde-Wurf",cat:"Techniken",img:"bilder/Tenchi Nage 3.png",kyu:4},
            {jp:"Juji-Garami",de:"Armkreuzwurf",cat:"Techniken",img:"bilder/Juji Garami transparent.png",kyu:2},
            {jp:"Koshi-Nage",de:"Hüftwurf",cat:"Techniken",img:"bilder/Koshi Nage transparent.png",kyu:3},
            {jp:"Mae-Mawaru-Ukemi",de:"Vorwärtsrolle",cat:"Ukemi",img:"bilder/Mae Mawaru Ukemi 2.png",kyu:6},
            {jp:"Ushiro-Mawaru-Ukemi",de:"Rückwärtsrolle",cat:"Ukemi",img:"bilder/Ushiro Mawaru Ukemi.png",kyu:6},
            {jp:"Mae-Ukemi",de:"Vorwärts stürzen",cat:"Ukemi",img:"bilder/mae Ukemi transparent.png",kyu:5},
            {jp:"Katate-Tori Ai-Hanmi",de:"Einhandgriff (Gleich)",cat:"Angriffe",img:"bilder/Katate Tori Ai Hanmi.png",kyu:6},
            {jp:"Katate-Tori Gyaku-Hanmi",de:"Einhandgriff (Gegen)",cat:"Angriffe",img:"bilder/Katate Tori Gyaku Hanmi.png",kyu:6},
            {jp:"Shomen-Uchi",de:"Schlag auf Kopf",cat:"Angriffe",img:"bilder/Shomen Uchi.png",kyu:6},
            {jp:"Yokomen-Uchi",de:"Seitlicher Schlag",cat:"Angriffe",img:"bilder/Yokomen Uchi.png",kyu:5},
            {jp:"Jo",de:"Stab",cat:"Waffen",img:"bilder/Aiki Jo.png",kyu:5},
            {jp:"Tanto",de:"Messer",cat:"Waffen",img:"bilder/Aiki Tanto Jutsu.png",kyu:4},
            {jp:"Mune Gatame",de:"Brustfesthalte",cat:"Bodenkampf",img:"bilder/Mune Gatame 1.png",kyu:5},
            {jp:"Kesa-Gatame",de:"Schärpenfesthalte",cat:"Bodenkampf",img:"bilder/Kesa_gatame.png",kyu:4},
            {jp:"Mae-Geri",de:"Gerader Tritt",cat:"Angriffe",img:"bilder/mae-geri.jpg",kyu:4},
            {jp:"Ushiro-Eri-Tori",de:"Kragen von hinten fassen",cat:"Angriffe",img:"bilder/ushiro-eri-dori.jpg",kyu:3}
        ];

        // --- STATE & DATA ---
        let appData = {
            cards: [],
            sm: {},
            stats: { pts: 0, kyu: 6 },
            pin: "0711"
        };

        let session = {
            type: null,
            list: [],
            idx: 0,
            score: 0,
            timer: null,
            revealed: false
        };

        let pinInputStr = "";
        let lexFilter = "Alle";

        // --- INIT ---
        function init() {
            const saved = localStorage.getItem('zfk_v7_data');
            if(saved) {
                appData = JSON.parse(saved);
            } else {
                appData.cards = JSON.parse(JSON.stringify(CARDS));
            }
            setupPinPad();
            updateStats();
            initChart();
            renderKyuNav();
            showScreen('home');
        }

        function save() {
            localStorage.setItem('zfk_v7_data', JSON.stringify(appData));
        }

        // --- NAVIGATION ---
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
            document.getElementById('screen-' + id).classList.remove('hidden');
            if(id === 'home') {
                updateStats();
                updateChart();
            }
            if(id === 'lexikon') updateLexikon();
            if(id === 'admin') renderAdmin();
        }
        window.showScreen = showScreen;

        // --- CHART & STATS ---
        let progressChart;
        function initChart() {
            const ctx = document.getElementById('progressChart').getContext('2d');
            progressChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Gelernt', 'Offen'],
                    datasets: [{
                        data: [0, 100],
                        backgroundColor: ['#e31e24', '#f0f0f0'],
                        borderWidth: 0,
                        cutout: '80%'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    animation: { duration: 1500 }
                }
            });
        }

        function updateStats() {
            const learned = appData.cards.filter(c => (appData.sm[c.jp]?.rep || 0) > 0).length;
            const due = appData.cards.filter(c => {
                if(c.kyu < appData.stats.kyu) return false;
                const s = appData.sm[c.jp];
                return !s || s.due <= Date.now();
            }).length;

            document.getElementById('stat-pts').textContent = appData.stats.pts;
            document.getElementById('stat-due').textContent = due;
            document.getElementById('stat-rank').textContent = appData.stats.kyu + ". Kyu";
        }

        function updateChart() {
            const learned = appData.cards.filter(c => (appData.sm[c.jp]?.rep || 0) > 0).length;
            const total = appData.cards.length;
            const pct = total === 0 ? 0 : Math.round((learned / total) * 100);
            
            progressChart.data.datasets[0].data = [pct, 100 - pct];
            progressChart.update();
        }

        function renderKyuNav() {
            const kyus = [6, 5, 4, 3, 2, 1];
            document.getElementById('kyu-selector').innerHTML = kyus.map(k => `
                <button onclick="setKyu(${k})" class="px-5 py-2 rounded-full font-black text-xs whitespace-nowrap bg-stone-100 ${appData.stats.kyu === k ? 'border-2 border-[#e31e24] text-[#e31e24] bg-white' : ''}">
                    ${k}. KYU
                </button>
            `).join('');
        }
        window.setKyu = function(k) {
            appData.stats.kyu = k;
            save();
            renderKyuNav();
            updateStats();
        };

        // --- SESSION MODES ---
        window.startMode = function(mode) {
            session.type = mode;
            session.score = 0;
            session.idx = 0;
            session.revealed = false;

            // Filter nach Kyu: Nur Karten die dem gewählten Kyu oder niedriger (numerisch höher) entsprechen
            session.list = appData.cards.filter(c => c.kyu >= appData.stats.kyu);

            if(mode === 'learn') {
                session.list = session.list.filter(c => !appData.sm[c.jp] || appData.sm[c.jp].due <= Date.now());
            }
            
            session.list.sort(() => Math.random() - 0.5);
            if(mode !== 'learn') session.list = session.list.slice(0, 10);

            if(session.list.length === 0) return alert("Alle Karten aktuell gelernt!");
            
            if(mode === 'learn') {
                showScreen('learn');
                renderLearnCard();
            } else {
                showScreen('quiz');
                if(mode === 'duell') startDuellTimer();
                renderQuiz();
            }
        };

        // --- LERNMODUS ---
        function renderLearnCard() {
            const card = session.list[session.idx];
            
            // 1. Reset UI (Fix Aufblitzen)
            document.getElementById('learn-jp').textContent = "";
            document.getElementById('learn-de').textContent = "";
            document.getElementById('learn-img').src = "";
            document.getElementById('learn-img').style.display = 'none';
            const phs = document.querySelectorAll('#learn-image-container .fallback-icon');
            phs.forEach(p => p.remove());

            const ratingBox = document.getElementById('rating-controls');
            ratingBox.classList.remove('show');
            ratingBox.classList.add('hidden');
            document.getElementById('btn-reveal').classList.remove('hidden');

            // 2. Timeout für Render-Zyklus
            setTimeout(() => {
                document.getElementById('learn-jp').textContent = card.jp;
                document.getElementById('learn-de').textContent = card.de;
                if(card.img) {
                    document.getElementById('learn-img').src = card.img;
                    document.getElementById('learn-img').style.display = 'block';
                } else {
                    window.handleImageError(document.getElementById('learn-img'));
                }
                
                document.getElementById('learn-cat').textContent = card.cat;
                document.getElementById('learn-kyu-tag').textContent = card.kyu + ". KYU";
                document.getElementById('session-counter').textContent = `${session.idx + 1}/${session.list.length}`;
                document.getElementById('session-progress').style.width = ((session.idx + 1) / session.list.length * 100) + "%";
                
                session.revealed = false;
            }, 100);
        }

        window.revealSolution = function() {
            session.revealed = true;
            document.getElementById('btn-reveal').classList.add('hidden');
            document.getElementById('rating-controls').classList.remove('hidden');
            setTimeout(() => document.getElementById('rating-controls').classList.add('show'), 10);
        };

        window.handleRate = function(q) {
            const card = session.list[session.idx];
            updateSM(card.jp, q);
            if(q >= 3) appData.stats.pts += 5;
            
            session.idx++;
            if(session.idx < session.list.length) {
                renderLearnCard();
            } else {
                alert("Sitzung beendet!");
                showScreen('home');
            }
        };

        function updateSM(id, q) {
            let s = appData.sm[id] || { interval: 0, ef: 2.5, rep: 0, due: 0 };
            if (q < 3) {
                s.rep = 0; s.interval = 1;
            } else {
                if (s.rep === 0) s.interval = 1;
                else if (s.rep === 1) s.interval = 4;
                else s.interval = Math.round(s.interval * s.ef);
                s.rep++;
            }
            s.ef = Math.max(1.3, s.ef + (0.1 - (5 - q) * (0.08 + (5 - q) * 0.02)));
            s.due = Date.now() + (s.interval * 86400000);
            appData.sm[id] = s;
            save();
        }

        // --- QUIZ MODUS ---
        function renderQuiz() {
            const correct = session.list[session.idx % session.list.length];
            const others = appData.cards.filter(c => c.jp !== correct.jp).sort(() => Math.random() - 0.5).slice(0, 3);
            const options = [correct, ...others].sort(() => Math.random() - 0.5);

            document.getElementById('quiz-q').textContent = correct.jp;
            document.getElementById('quiz-cat-label').textContent = correct.cat;
            document.getElementById('quiz-score').textContent = session.score + " PKT";

            const container = document.getElementById('quiz-options');
            container.innerHTML = options.map(opt => `
                <button onclick="checkQuiz('${opt.jp}', '${correct.jp}', this)" class="bg-white w-full p-4 rounded-2xl font-black text-sm border-2 border-gray-100 transition-all btn-shadow uppercase">
                    ${opt.de}
                </button>
            `).join('');
        }
        window.renderQuiz = renderQuiz;

        window.checkQuiz = function(sel, cor, el) {
            if(sel === cor) {
                el.classList.add('bg-green-500', 'text-white', 'border-green-500');
                session.score += 10;
                appData.stats.pts += 2;
            } else {
                el.classList.add('bg-red-500', 'text-white', 'border-red-500');
            }
            setTimeout(() => {
                session.idx++;
                if(session.type === 'quiz' && session.idx >= 10) {
                    alert("Quiz beendet! Score: " + session.score);
                    showScreen('home');
                } else {
                    renderQuiz();
                }
            }, 600);
        };

        function startDuellTimer() {
            let time = 60;
            const timerEl = document.getElementById('quiz-timer');
            timerEl.textContent = time + "s";
            session.timer = setInterval(() => {
                time--;
                timerEl.textContent = time + "s";
                if(time <= 0) {
                    clearInterval(session.timer);
                    alert("Zeit um! Score: " + session.score);
                    showScreen('home');
                }
            }, 1000);
        }

        window.exitSession = function() {
            clearInterval(session.timer);
            showScreen('home');
        };

        // --- LEXIKON ---
        window.updateLexikon = function() {
            const query = document.getElementById('lex-search').value.toLowerCase();
            const cats = ['Alle', ...new Set(appData.cards.map(c => c.cat))];
            
            document.getElementById('lex-cats').innerHTML = cats.map(c => `
                <button onclick="setLexFilter('${c}')" class="px-5 py-2 rounded-full font-black text-[10px] whitespace-nowrap uppercase tracking-widest ${lexFilter === c ? 'bg-black text-white' : 'bg-white border border-gray-100'}">
                    ${c}
                </button>
            `).join('');

            const filtered = appData.cards.filter(c => {
                const matchesSearch = c.jp.toLowerCase().includes(query) || c.de.toLowerCase().includes(query);
                const matchesCat = lexFilter === 'Alle' || c.cat === lexFilter;
                return matchesSearch && matchesCat;
            }).sort((a,b) => a.jp.localeCompare(b.jp));

            document.getElementById('lex-list').innerHTML = filtered.map(c => `
                <div class="bg-white p-4 rounded-3xl border border-gray-50 flex items-center gap-4 shadow-sm">
                    <div class="w-12 h-12 bg-stone-50 rounded-xl flex items-center justify-center overflow-hidden">
                        ${c.img ? `<img src="${c.img}" class="w-full h-full object-cover" onerror="window.handleImageError(this)">` : '<div class="text-xl">🥋</div>'}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-black text-sm">${c.jp}</h4>
                        <p class="text-[11px] text-gray-400 font-bold">${c.de}</p>
                    </div>
                    <span class="text-[8px] font-black text-white bg-black px-2 py-1 rounded-md uppercase">${c.kyu}. Kyu</span>
                </div>
            `).join('');
        };

        window.setLexFilter = function(cat) {
            lexFilter = cat;
            updateLexikon();
        };

        // --- PIN PAD ---
        function setupPinPad() {
            const grid = document.getElementById('pin-grid');
            [1,2,3,4,5,6,7,8,9,'C',0,'OK'].forEach(v => {
                const b = document.createElement('button');
                b.className = "w-16 h-16 rounded-full bg-white border-2 border-gray-100 font-black text-xl flex items-center justify-center btn-shadow hover:border-[#e31e24]";
                b.textContent = v;
                b.onclick = () => handlePin(v);
                grid.appendChild(b);
            });
        }

        function handlePin(v) {
            if(v === 'C') pinInputStr = "";
            else if(v === 'OK') checkPin();
            else if(pinInputStr.length < 4) pinInputStr += v;
            
            const dots = document.querySelectorAll('.pin-dot');
            dots.forEach((d, i) => d.classList.toggle('active', i < pinInputStr.length));
            
            if(pinInputStr.length === 4 && v !== 'OK') setTimeout(checkPin, 300);
        }

        function checkPin() {
            if(pinInputStr === appData.pin) {
                pinInputStr = "";
                document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
                showScreen('admin');
            } else {
                alert("PIN FALSCH");
                pinInputStr = "";
                document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
            }
        }

        // --- ADMIN ---
        function renderAdmin() {
            const list = document.getElementById('admin-list');
            list.innerHTML = appData.cards.map((c, i) => `
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex items-center justify-between shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-stone-50 rounded-lg overflow-hidden flex items-center justify-center">
                            ${c.img ? `<img src="${c.img}" class="w-full h-full object-cover" onerror="window.handleImageError(this)">` : '<span class="text-xs">🥋</span>'}
                        </div>
                        <div>
                            <p class="text-xs font-black">${c.jp}</p>
                            <p class="text-[9px] text-gray-400 font-bold italic">${c.de} (${c.kyu}. Kyu)</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <button onclick="window.editTerm(${i})" class="text-blue-500 text-lg">✏️</button>
                        <button onclick="window.deleteTerm(${i})" class="text-red-500 text-lg">🗑️</button>
                    </div>
                </div>
            `).join('');
        }

        window.openAdminForm = function(idx) {
            document.getElementById('admin-form').classList.remove('hidden');
            document.getElementById('admin-controls').classList.add('hidden');
            document.getElementById('edit-index').value = idx;
            
            if(idx >= 0) {
                const c = appData.cards[idx];
                document.getElementById('form-title').textContent = "BEGRIFF BEARBEITEN";
                document.getElementById('inp-jp').value = c.jp;
                document.getElementById('inp-de').value = c.de;
                document.getElementById('inp-kyu').value = c.kyu;
                document.getElementById('inp-cat').value = c.cat;
                document.getElementById('inp-img').value = c.img;
            } else {
                document.getElementById('form-title').textContent = "NEUER BEGRIFF";
                document.getElementById('inp-jp').value = "";
                document.getElementById('inp-de').value = "";
                document.getElementById('inp-kyu').value = "6";
                document.getElementById('inp-cat').value = "Grundlagen";
                document.getElementById('inp-img').value = "bilder/";
            }
        };

        window.closeAdminForm = function() {
            document.getElementById('admin-form').classList.add('hidden');
            document.getElementById('admin-controls').classList.remove('hidden');
        };

        window.saveAdminForm = function() {
            const idx = parseInt(document.getElementById('edit-index').value);
            const data = {
                jp: document.getElementById('inp-jp').value,
                de: document.getElementById('inp-de').value,
                kyu: parseInt(document.getElementById('inp-kyu').value) || 6,
                cat: document.getElementById('inp-cat').value,
                img: document.getElementById('inp-img').value
            };

            if(!data.jp || !data.de) return alert("Bitte fülle Japanisch und Deutsch aus!");

            if(idx >= 0) appData.cards[idx] = data;
            else appData.cards.push(data);

            save();
            renderAdmin();
            closeAdminForm();
        };

        window.addNewTerm = function() {
            openAdminForm(-1);
        };

        // --- TOOLS ---
        window.playVoice = function() {
            const text = document.getElementById('learn-jp').textContent;
            if(!text) return;
            const u = new SpeechSynthesisUtterance(text);
            u.lang = 'ja-JP'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        };

        window.exportData = function() {
            const blob = new Blob([JSON.stringify(appData)], {type:'application/json'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `zfk_aikido_backup.json`;
            a.click();
        };

        window.importData = function(e) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                try {
                    const d = JSON.parse(ev.target.result);
                    if(d.cards) { appData = d; save(); location.reload(); }
                } catch(err) { alert("Datei ungültig."); }
            };
            if(e.target.files[0]) reader.readAsText(e.target.files[0]);
        };

        window.onload = init;
    </script>
</body>
</html>
